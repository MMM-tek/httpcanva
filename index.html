<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTTPcanva - Engine V6</title>
    <style>
        :root { --sidebar-bg: #1e1e1e; --text-color: #ddd; --accent: #0078d4; --bg-dark: #121212; }
        body { display: flex; flex-direction: column; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; background: var(--bg-dark); color: var(--text-color); overflow: hidden; }
        
        /* Splash Screen */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18,18,18,0.98); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .splash-btn { padding: 15px 30px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        
        /* Tab Bar */
        #tab-bar { display: flex; background: #252525; padding: 8px; border-bottom: 1px solid #333; align-items: center; gap: 5px; }
        #tabs-container { display: flex; gap: 5px; }
        .tab-btn { padding: 6px 12px; background: #333; border: 1px solid #444; color: white; cursor: pointer; border-radius: 4px; font-size: 12px; display: flex; align-items: center; }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); }
        .tab-btn span { margin-right: 8px; }
        .tab-btn small { color: #ff4d4d; font-weight: bold; }
        
        /* Main Layout */
        .main-container { display: flex; flex-grow: 1; overflow: hidden; }
        #assets-menu { width: 260px; background: var(--sidebar-bg); border-right: 1px solid #333; display: flex; flex-direction: column; }
        #canvas { flex-grow: 1; background: white; position: relative; margin: 15px; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #properties-panel { width: 300px; background: var(--sidebar-bg); border-left: 1px solid #333; display: flex; flex-direction: column; }
        
        /* Elements */
        .dropped { position: absolute; cursor: move; }
        .selected { outline: 2px solid var(--accent) !important; }
        .item-container { background: #2d2d2d; margin: 10px; border-radius: 6px; border: 1px solid #444; cursor: grab; overflow: hidden; }
        .item-label { background: #383838; padding: 5px; font-size: 10px; text-align: center; font-weight: bold; border-bottom: 1px solid #444; }
        .preview-box { height: 60px; display: flex; align-items: center; justify-content: center; background: white; zoom: 0.6; pointer-events: none; }

        /* Form elements */
        #editor-scroll { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .prop-group { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 8px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { width: calc(100% - 30px); margin: 5px 15px; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 style="color:var(--accent);">HTTPcanva</h1>
        <p style="color:#666;">Select an option to start</p>
        <div>
            <button class="splash-btn" style="background:var(--accent);" onclick="startNewProject()">+ New Project</button>
            <button class="splash-btn" style="background:#444;" onclick="document.getElementById('file-input').click()">📂 Load .http</button>
        </div>
        <input type="file" id="file-input" style="display:none" accept=".http" onchange="loadProject(event)">
    </div>

    <div id="tab-bar">
        <div id="tabs-container"></div>
        <button onclick="createNewScene()" style="background:#444; color:#0f0; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">+</button>
        <div id="project-title" style="margin-left:auto; font-size:12px; color:#555; padding-right:15px;">Project: <span>None</span></div>
        <button onclick="saveProjectFile()" style="background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; margin-right:10px;">Save .http</button>
    </div>

    <div class="main-container">
        <aside id="assets-menu">
            <input type="text" id="search-input" style="margin:10px; width:calc(100% - 20px)" placeholder="Search assets...">
            <div id="items-list"></div>
        </aside>

        <main id="canvas"></main>

        <aside id="properties-panel">
            <div id="editor-scroll">
                <div id="editor-ui" style="display:none">
                    <div class="prop-group"><label>Scene Name</label><input type="text" id="scene-name-input"></div>
                    <div class="prop-group"><label>Element ID</label><input type="text" id="prop-id"></div>
                    <div class="prop-group"><label>Content (use / for dropdown)</label><input type="text" id="prop-text"></div>
                    <div class="prop-group"><label>Width (px)</label><input type="number" id="prop-w"></div>
                    <div class="prop-group"><label>Height (px)</label><input type="number" id="prop-h"></div>
                    <div class="prop-group"><label>Layer (Z-Index)</label><input type="number" id="prop-z"></div>
                    <button class="btn" style="background:var(--accent); width:100%; margin:0" id="apply-btn">Apply Changes</button>
                </div>
                <div class="prop-group"><label>Canvas BG</label><input type="color" id="canvas-bg"></div>
                <div class="prop-group"><label>Custom CSS</label><textarea id="css-editor" rows="5"></textarea></div>
                <div class="prop-group"><label>Scene JS</label><textarea id="js-editor" rows="8" placeholder="goToScene('Scene 2')"></textarea></div>
            </div>
            <button class="btn" style="background:#6f42c1" onclick="openPreview()">Preview (New Tab)</button>
            <button class="btn" style="background:#28a745; margin-bottom:20px" onclick="exportHTML()">Export index.html</button>
        </aside>
    </div>

    <style id="live-css"></style>
    <script src="script.js"></script>
</body>
</html>
