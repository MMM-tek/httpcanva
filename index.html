<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTPcanva - Engine v5</title>
    <style>
        :root { --sidebar-bg: #1e1e1e; --text-color: #ddd; --accent: #0078d4; --bg-dark: #121212; }
        body { display: flex; flex-direction: column; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; background: var(--bg-dark); color: var(--text-color); overflow: hidden; }
        
        /* Top Tab Bar */
        #tab-bar { display: flex; background: #252525; padding: 10px; border-bottom: 1px solid #333; align-items: center; }
        #tabs-container { display: flex; gap: 8px; }
        .tab-btn { padding: 8px 16px; background: #333; border: none; color: white; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .tab-btn.active { background: var(--accent); font-weight: bold; }
        .add-scene-btn { margin-left: 15px; background: #444; color: #0f0; border: none; cursor: pointer; padding: 5px 12px; border-radius: 4px; font-weight: bold; }

        /* Layout */
        .main-container { display: flex; flex-grow: 1; overflow: hidden; }
        
        /* Assets Menu */
        #assets-menu { width: 280px; background: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid #333; }
        #items-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .item-container { background: #2d2d2d; margin-bottom: 15px; border-radius: 6px; border: 1px solid #444; cursor: grab; overflow: hidden; }
        .item-label { background: #383838; padding: 6px; font-size: 11px; text-align: center; color: #fff; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #444; }
        .preview-box { height: 70px; display: flex; align-items: center; justify-content: center; background: white; zoom: 0.7; pointer-events: none; }

        /* Canvas */
        #canvas { flex-grow: 1; background: white; position: relative; margin: 15px; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .dropped { position: absolute; cursor: move; }
        .selected { outline: 2px solid var(--accent) !important; box-shadow: 0 0 10px rgba(0,120,212,0.4); }

        /* Properties Panel */
        #properties-panel { width: 300px; background: var(--sidebar-bg); display: flex; flex-direction: column; border-left: 1px solid #333; }
        #editor-scroll { flex-grow: 1; overflow-y: auto; padding: 0 15px; }
        .header { padding: 15px; font-weight: bold; color: var(--accent); border-bottom: 1px solid #333; text-align: center; }
        .prop-group { padding: 12px 0; border-bottom: 1px solid #333; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 8px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        textarea { font-family: monospace; font-size: 12px; }
        
        .btn { width: calc(100% - 30px); margin: 10px 15px; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); color: white; }
        .btn-preview { background: #6f42c1; color: white; }
        .btn-export { background: #28a745; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="tab-bar">
        <div id="tabs-container"></div>
        <button class="add-scene-btn" onclick="createNewScene()">+ New Scene</button>
    </div>

    <div class="main-container">
        <aside id="assets-menu">
            <div class="header">ASSETS</div>
            <input type="text" id="search-input" style="margin:10px; width:calc(100% - 20px)" placeholder="Search...">
            <div id="items-list"></div>
        </aside>

        <main id="canvas"></main>

        <aside id="properties-panel">
            <div class="header">PROPERTIES</div>
            <div id="editor-scroll">
                <div id="editor" style="display:none;">
                    <div class="prop-group"><label>Scene Name</label><input type="text" id="scene-name-input"></div>
                    <div class="prop-group"><label>Element ID</label><input type="text" id="prop-id"></div>
                    <div class="prop-group"><label>Text / Value (/ for Dropdown)</label><input type="text" id="prop-text"></div>
                    <div class="prop-group"><label>Width (px)</label><input type="number" id="prop-w"></div>
                    <div class="prop-group"><label>Height (px)</label><input type="number" id="prop-h"></div>
                    <div class="prop-group"><label>Z-Index</label><input type="number" id="prop-z"></div>
                    <button class="btn btn-save" id="save-btn">Apply Changes</button>
                </div>
                
                <div class="prop-group">
                    <label>Canvas Background</label>
                    <input type="color" id="canvas-bg-input" value="#ffffff">
                </div>
                <div class="prop-group">
                    <label>Custom Global CSS</label>
                    <textarea id="custom-css-area" rows="4" placeholder=".class { ... }"></textarea>
                </div>
                <div class="prop-group">
                    <label>Scene JavaScript</label>
                    <textarea id="scene-js-area" rows="6" placeholder="goToScene('Scene 2');"></textarea>
                </div>
                <p id="no-selection" style="text-align:center; color:#555; padding:20px;">Select an item to edit its properties</p>
            </div>
            
            <button class="btn btn-preview" id="preview-mode-btn">Preview (New Tab)</button>
            <button class="btn btn-export" id="export-btn">Export index.html</button>
        </aside>
    </div>

    <style id="live-custom-css"></style>
    <script src="script.js"></script>
</body>
</html>
