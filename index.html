<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTTPcanva - Web Builder</title>
    <style>
        :root { --sidebar-bg: #1e1e1e; --text-color: #ddd; --accent: #0078d4; --bg-dark: #121212; }
        body { display: flex; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; background: var(--bg-dark); color: var(--text-color); overflow: hidden; }
        
        /* Sidebar Styles */
        #assets-menu, #properties-panel { width: 280px; background: var(--sidebar-bg); display: flex; flex-direction: column; border: 1px solid #333; }
        .header { padding: 15px; font-weight: bold; border-bottom: 1px solid #333; background: #252525; }
        
        #search-input { width: calc(100% - 20px); margin: 10px; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 6px; }
        
        #items-list { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .item-card { background: #2d2d2d; padding: 15px; border-radius: 8px; cursor: grab; text-align: center; font-size: 12px; border: 1px solid transparent; transition: 0.3s; }
        .item-card:hover { border-color: var(--accent); background: #383838; }

        /* Canvas (Preview) Area */
        #canvas { flex-grow: 1; background: #f0f0f0; position: relative; margin: 15px; border-radius: 8px; overflow: hidden; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; }
        
        /* Elements on Canvas */
        .dropped { position: absolute; cursor: move; box-sizing: border-box; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .selected { outline: 2px solid var(--accent) !important; box-shadow: 0 0 10px rgba(0,120,212,0.5); }
        
        /* Resize handle */
        .resizer { width: 10px; height: 10px; background: var(--accent); position: absolute; right: 0; bottom: 0; cursor: se-resize; }

        /* Properties Styles */
        .prop-group { padding: 10px 15px; border-bottom: 1px solid #333; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 8px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; }
        .btn { width: calc(100% - 30px); margin: 15px; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); color: white; }
        .btn-export { background: #28a745; color: white; }
    </style>
</head>
<body>

    <aside id="assets-menu">
        <div class="header">httpgen Assets</div>
        <input type="text" id="search-input" placeholder="Search components...">
        <div id="items-list"></div>
    </aside>

    <main id="canvas"></main>

    <aside id="properties-panel">
        <div class="header">Properties</div>
        <div id="editor" style="display:none;">
            <div class="prop-group"><label>Element ID</label><input type="text" id="prop-id"></div>
            <div class="prop-group"><label>Content / Text</label><input type="text" id="prop-text"></div>
            <div class="prop-group" id="img-path-group" style="display:none;"><label>Image URL</label><input type="text" id="prop-src"></div>
            <div class="prop-group"><label>Width (px)</label><input type="number" id="prop-w"></div>
            <div class="prop-group"><label>Height (px)</label><input type="number" id="prop-h"></div>
            <div class="prop-group"><label>Layer (Z-Index)</label><input type="number" id="prop-z"></div>
            <button class="btn btn-save" id="save-btn">Apply Changes</button>
        </div>
        <p id="no-selection" style="padding:20px; color:#666;">Select an element to edit</p>
        <button class="btn btn-export" id="export-btn">Download Web</button>
    </aside>

    <script src="script.js"></script>
</body>
</html>
