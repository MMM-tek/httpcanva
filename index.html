<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTTPcanva - Visual Editor</title>
    <style>
        :root { --sidebar-bg: #1e1e1e; --text-color: #ddd; --accent: #0078d4; --bg-dark: #121212; }
        body { display: flex; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; background: var(--bg-dark); color: var(--text-color); overflow: hidden; }
        
        /* Sidebars */
        #assets-menu, #properties-panel { width: 300px; background: var(--sidebar-bg); display: flex; flex-direction: column; border: 1px solid #333; }
        .header { padding: 15px; font-weight: bold; border-bottom: 1px solid #333; background: #252525; text-align: center; color: var(--accent); letter-spacing: 1px; }
        
        #search-input { width: calc(100% - 30px); margin: 15px; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 6px; }
        
        /* ITEM PREVIEW IN MENU */
        #items-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .item-container { background: #2d2d2d; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; cursor: grab; overflow: hidden; transition: 0.3s; }
        .item-container:hover { border-color: var(--accent); }
        .item-label { background: #383838; padding: 5px; font-size: 10px; text-align: center; color: #aaa; text-transform: uppercase; }
        .preview-box { height: 80px; display: flex; align-items: center; justify-content: center; background: white; zoom: 0.6; pointer-events: none; }

        /* Workspace */
        #canvas { flex-grow: 1; background: white; position: relative; margin: 15px; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .dropped { position: absolute; cursor: move; box-sizing: border-box; }
        .selected { outline: 2px solid var(--accent) !important; box-shadow: 0 0 10px rgba(0,120,212,0.4); }

        /* Property Groups */
        .prop-group { padding: 12px 20px; border-bottom: 1px solid #333; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 8px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { width: calc(100% - 40px); margin: 20px; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-save { background: var(--accent); color: white; }
        .btn-export { background: #28a745; color: white; margin-top: 0; }

        /* Update your CSS with this */
        #properties-panel { 
            width: 300px; 
            background: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #333; 
            height: 100vh; /* Asegura que ocupe todo el alto */
        }

        #editor { 
            flex-grow: 1; 
            overflow-y: auto; /* ESTO ACTIVA EL SCROLL */
            padding-bottom: 20px;
        }

        /* Opcional: Hacer el scroll más fino y oscuro para que pegue con el diseño */
        #editor::-webkit-scrollbar {
            width: 6px;
        }
        #editor::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
        #editor::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>

    <aside id="assets-menu">
        <div class="header">HTTPcanva ASSETS</div>
        <input type="text" id="search-input" placeholder="Search components...">
        <div id="items-list"></div>
    </aside>

    <main id="canvas"></main>

    <aside id="properties-panel">
        <div class="header">PROPERTIES</div>
        <div id="editor" style="display:none;">
            <div class="prop-group"><label>Element ID</label><input type="text" id="prop-id"></div>
            <div class="prop-group"><label>Text / Value</label><input type="text" id="prop-text"></div>
            <div class="prop-group" id="img-path-group" style="display:none;"><label>Image URL</label><input type="text" id="prop-src"></div>
            <div class="prop-group"><label>Width (px)</label><input type="number" id="prop-w"></div>
            <div class="prop-group"><label>Height (px)</label><input type="number" id="prop-h"></div>
            <div class="prop-group"><label>Z-Index (Layer)</label><input type="number" id="prop-z"></div>
            <button class="btn btn-save" id="save-btn">Apply Changes</button>
        </div>
        <p id="no-selection" style="padding:20px; color:#666; text-align:center;">Select an element to edit</p>
        <button class="btn btn-export" id="export-btn">Export index.html</button>
        <button class="btn" id="preview-mode-btn" style="background: #6f42c1; color: white;">Preview Mode: OFF</button>
        <!-- Fondo del Canvas -->
        <div class="prop-group">
            <label>Canvas Background</label>
            <input type="color" id="canvas-bg-input" value="#ffffff">
        </div>

<!-- Editor de CSS -->
        <div class="prop-group">
            <label>Custom CSS (Global)</label>
            <textarea id="custom-css-area" rows="6" style="width:100%; background:#2d2d2d; color:#0f0; font-family:monospace; border:1px solid #444; border-radius:4px;" placeholder=".my-class { ... }"></textarea>
        </div>
        <style id="live-custom-css"></style>
    </aside>

    <script src="script.js"></script>
</body>
</html>
